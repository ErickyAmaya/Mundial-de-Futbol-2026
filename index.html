<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#e8b400"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Mundial 2026"/>
<link rel="manifest" href="./manifest.json"/>
<title>Mundial 2026 — Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07090b;--bg2:#0f1418;--bg3:#161e26;--border:rgba(255,255,255,.08);
  --gold:#e8b400;--goldl:rgba(232,180,0,.12);--green:#52b788;--red:#e63946;
  --blue:#74b9ff;--text:rgba(255,255,255,.9);--muted:rgba(255,255,255,.35)}
body{background:var(--bg);color:var(--text);font-family:'Outfit',system-ui,sans-serif;min-height:100vh}
/* HEADER */
.hdr{text-align:center;padding:18px 14px 12px;border-bottom:1px solid var(--border);
  background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(232,180,0,.06),transparent)}
.hdr::before{content:'';display:block;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin-bottom:14px}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(30px,7vw,56px);letter-spacing:5px;color:var(--gold);line-height:1}
.hdr-sub{font-size:11px;letter-spacing:2px;color:var(--muted);margin-top:4px;text-transform:uppercase}
.hdr-badges{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.badge{padding:3px 11px;border-radius:12px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border:1px solid}
.badge-g{background:var(--goldl);border-color:rgba(232,180,0,.3);color:var(--gold)}
.badge-b{background:rgba(116,185,255,.1);border-color:rgba(116,185,255,.25);color:var(--blue)}
.hdr-tools{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.saved-lbl{font-size:11px;color:rgba(82,183,136,.8)}
.reset-btn{font-size:11px;padding:4px 12px;border-radius:12px;border:1px solid rgba(230,57,70,.3);
  background:rgba(230,57,70,.08);color:rgba(230,57,70,.7);cursor:pointer}
.reset-btn:hover{background:rgba(230,57,70,.2)}
/* ACC BAR */
.acc-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:8px 12px;
  background:var(--bg2);border-bottom:1px solid var(--border)}
.ap{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:14px;font-size:11px;font-weight:600;border:1px solid}
.ap-e{background:rgba(82,183,136,.15);border-color:rgba(82,183,136,.3);color:#81c784}
.ap-c{background:rgba(116,185,255,.12);border-color:rgba(116,185,255,.25);color:#90caf9}
.ap-w{background:rgba(230,57,70,.1);border-color:rgba(230,57,70,.2);color:#ef9a9a}
.ap-p{background:rgba(255,255,255,.05);border-color:var(--border);color:var(--muted)}
.acc-pct{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--gold);margin-left:auto}
.sim-lbl{font-size:10px;color:var(--muted);font-style:italic}
/* TABS */
.tabs{display:flex;gap:2px;padding:10px 12px 0;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:7px 13px;
  border:none;border-radius:5px 5px 0 0;background:transparent;color:var(--muted);cursor:pointer;
  white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s;font-family:'Outfit',sans-serif}
.tab-btn:hover{color:rgba(255,255,255,.6)}
.tab-btn.active{color:var(--gold);background:var(--goldl);border-bottom:2px solid var(--gold)}
/* CONTENT */
.content{padding:12px;max-width:1100px;margin:0 auto}
.tab-panel{display:none}.tab-panel.active{display:block}
/* GROUPS */
.grp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:700px){.grp-grid{grid-template-columns:repeat(4,1fr)}}
.grp-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.grp-col{border-color:rgba(253,216,53,.35)!important}
.grp-col .grp-head{background:rgba(253,216,53,.1)!important}
.grp-head{padding:8px 12px;background:var(--goldl);border-bottom:1px solid rgba(232,180,0,.1);
  display:flex;align-items:center;gap:8px}
.grp-letter{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);line-height:1}
.grp-info{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.grp-pred{font-size:9px;color:rgba(232,180,0,.5)}
/* STANDINGS */
.st-tbl{width:100%;border-collapse:collapse;font-size:11px}
.st-tbl th{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);
  padding:4px 5px;text-align:center;border-bottom:1px solid var(--border)}
.st-tbl th:first-child{text-align:left;padding-left:10px}
.st-tbl td{padding:5px 5px;text-align:center;border-bottom:1px solid rgba(255,255,255,.04)}
.st-tbl td:first-child{text-align:left;padding-left:8px}
.st-tbl tr:last-child td{border-bottom:none}
.row-q1{background:rgba(82,183,136,.1)}.row-q2{background:rgba(82,183,136,.05)}.row-q3{background:rgba(232,180,0,.05)}
.tc{display:flex;align-items:center;gap:5px}
.pts{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--gold)}
.dg-p{color:var(--green)}.dg-n{color:var(--red)}
/* MATCH ROWS */
.match-toggle{width:100%;background:none;border:none;color:var(--muted);font-size:10px;
  letter-spacing:1px;padding:6px 12px;text-align:left;cursor:pointer;font-family:'Outfit',sans-serif;
  text-transform:uppercase;display:flex;align-items:center;gap:4px;border-top:1px solid var(--border)}
.match-toggle:hover{color:rgba(255,255,255,.5)}
.matches-list{display:none}.matches-list.open{display:block}
.m-row{display:grid;grid-template-columns:54px 1fr auto auto auto;align-items:center;
  gap:5px;padding:5px 10px;border-top:1px solid rgba(255,255,255,.04)}
.m-row.col-match{background:rgba(253,216,53,.06);border-left:2px solid rgba(253,216,53,.5)}
.m-date{font-size:9px;color:var(--muted);line-height:1.3;text-align:center}
.m-date b{color:rgba(232,180,0,.7);display:block}
.m-teams{font-size:11px;line-height:1.65}
.pred-s{font-family:'JetBrains Mono',monospace;font-size:11px;background:rgba(232,180,0,.08);
  padding:2px 5px;border-radius:3px;color:rgba(232,180,0,.7);min-width:30px;text-align:center;border:1px solid rgba(232,180,0,.12)}
.inp-pair{display:flex;align-items:center;gap:3px}
.score-in{width:28px;height:26px;border-radius:4px;border:1px solid var(--border);background:rgba(255,255,255,.06);
  color:var(--text);text-align:center;font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;
  padding:0;outline:none;-webkit-appearance:none;appearance:none}
.score-in:focus{border-color:rgba(232,180,0,.5);background:rgba(232,180,0,.06)}
.acc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-e{background:var(--green)}.dot-c{background:var(--blue)}.dot-w{background:var(--red)}.dot-p{background:rgba(255,255,255,.15)}
/* SIM */
.sim-panel{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px}
.run-btn{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:3px;padding:10px 28px;
  border:2px solid var(--gold);border-radius:7px;background:var(--goldl);color:var(--gold);cursor:pointer;transition:all .2s}
.run-btn:hover:not(:disabled){background:rgba(232,180,0,.22);transform:translateY(-1px)}
.run-btn:disabled{opacity:.5;cursor:not-allowed}
.prog-wrap{margin-top:10px}.prog-bar{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),#ff9500);border-radius:3px;transition:width .1s;width:0%}
.prog-lbl{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
.top5{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.t5-pill{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);font-size:12px}
.t5-pct{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;margin-left:auto}
/* PROB TABLE */
.prob-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
.prob-tbl th{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
  padding:5px 8px;text-align:right;border-bottom:1px solid var(--border)}
.prob-tbl th:first-child,.prob-tbl th:nth-child(2){text-align:left}
.prob-tbl td{padding:6px 8px;text-align:right;border-bottom:1px solid rgba(255,255,255,.04)}
.prob-tbl td:first-child,.prob-tbl td:nth-child(2){text-align:left}
.prob-tbl tr.hl1 td{background:rgba(232,180,0,.06)}.prob-tbl tr.hl2 td{background:rgba(116,185,255,.04)}
.bar-cell{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.bar-bg{width:80px;height:5px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;flex-shrink:0}
.bar-f{height:100%;border-radius:2px}
.jm{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
/* KO */
.ph-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--gold);
  margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid rgba(232,180,0,.15);display:flex;align-items:baseline;gap:10px}
.ph-date{font-family:'Outfit',sans-serif;font-size:11px;color:var(--muted)}
.note-box{font-size:11px;color:var(--muted);background:rgba(255,255,255,.03);border-radius:6px;
  padding:7px 11px;margin-bottom:10px;line-height:1.55;border-left:2px solid rgba(232,180,0,.25)}
.ko-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:10px}
.ko-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.ko-card.final-card{border-color:rgba(232,180,0,.4);background:rgba(232,180,0,.04)}
.ko-hdr{padding:5px 12px;background:rgba(0,0,0,.2);display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}
.ko-hdr .venue{font-size:9px;color:rgba(255,255,255,.18)}
.ko-team{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:8px;
  padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.04)}
.ko-team:last-of-type{border-bottom:none}
.ko-team.win-row{background:rgba(82,183,136,.08)}.ko-team.lose-row{opacity:.5}
.ko-name{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600}
.ko-name .unk{color:var(--muted);font-size:11px;font-style:italic}
.pred-big{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:rgba(232,180,0,.4);min-width:18px;text-align:center}
.pred-big.win{color:rgba(255,255,255,.55)}
.ko-act{display:flex;align-items:center;gap:8px;padding:6px 12px;background:rgba(255,255,255,.03);border-top:1px solid var(--border)}
.ko-act-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.note-in{flex:1;font-size:10px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:rgba(255,255,255,.6);
  border-radius:4px;padding:3px 7px;outline:none;font-family:'Outfit',sans-serif}
.note-in:focus{border-color:rgba(232,180,0,.4)}
.ko-acc-lbl{font-size:10px;font-weight:700;letter-spacing:.5px;padding:2px 12px;text-align:right}
.acc-exact{color:var(--green)}.acc-correct{color:var(--blue)}.acc-wrong{color:var(--red)}
/* COLOMBIA */
.col-banner{background:linear-gradient(135deg,rgba(253,216,53,.12),rgba(76,175,80,.08));
  border:1px solid rgba(253,216,53,.3);border-radius:10px;padding:16px;text-align:center;margin-bottom:14px}
.col-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;color:#fdd835;margin-bottom:4px}
.col-next{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:4px}
.col-countdown{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;color:#fdd835}
.col-match-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:10px}
.col-match-card.upcoming{border-color:rgba(253,216,53,.35)}
.col-mhdr{padding:6px 12px;background:rgba(253,216,53,.07);border-bottom:1px solid rgba(253,216,53,.1);
  display:flex;justify-content:space-between;align-items:center}
.col-mhdr .dt{font-size:12px;font-weight:700;color:#fdd835}
.col-mbody{padding:10px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.col-mteams{flex:1;font-size:14px;font-weight:600;min-width:160px}
.col-mbtns{display:flex;gap:6px;flex-wrap:wrap;padding:6px 12px;background:rgba(255,255,255,.03);border-top:1px solid var(--border)}
.notif-btn{font-size:11px;padding:5px 12px;border-radius:6px;cursor:pointer;font-weight:600;
  font-family:'Outfit',sans-serif;transition:all .2s;text-decoration:none;display:inline-block}
.notif-btn.primary{background:rgba(253,216,53,.15);border:1px solid rgba(253,216,53,.3);color:#fdd835}
.notif-btn.cal{background:rgba(82,183,136,.1);border:1px solid rgba(82,183,136,.25);color:var(--green)}
.ko-path-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:4px}
.ko-path-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.ko-path-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
.ko-path-row:last-child{border-bottom:none}
/* FINAL */
.final-banner{background:linear-gradient(135deg,rgba(232,180,0,.1),rgba(232,180,0,.03));
  border:1px solid rgba(232,180,0,.4);border-radius:10px;padding:20px;text-align:center;margin-bottom:14px}
.final-teams{font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,4vw,34px);letter-spacing:2px;margin:4px 0}
.final-preds{display:flex;justify-content:center;gap:24px;margin-top:10px}
.final-pct{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--gold)}
.b3-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:10px}
.b3-title{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.b3-list{display:flex;flex-wrap:wrap;gap:6px}
.b3-pill{padding:3px 10px;border-radius:4px;font-size:12px;font-weight:600;
  background:rgba(232,180,0,.08);border:1px solid rgba(232,180,0,.18);display:flex;align-items:center;gap:5px}
.sum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-top:14px}
.sum-card{background:rgba(255,255,255,.03);border-radius:6px;padding:9px;text-align:center;border:1px solid var(--border)}
.sum-lbl{font-size:10px;color:var(--muted);margin-bottom:3px}
.sum-val{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700}
.ovf{overflow-x:auto}
.awards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;margin-top:10px}
.award-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.award-hdr{padding:10px 14px;background:rgba(232,180,0,.07);border-bottom:1px solid rgba(232,180,0,.1);
  display:flex;align-items:center;gap:8px}
.award-icon{font-size:22px;line-height:1}
.award-name{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;color:var(--gold)}
.award-body{padding:12px 14px}
.award-pred{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px 10px;
  background:rgba(232,180,0,.06);border-radius:6px;border:1px solid rgba(232,180,0,.1)}
.award-pred-lbl{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:rgba(232,180,0,.5);margin-bottom:2px}
.award-pred-val{font-size:14px;font-weight:700}
.award-pred-prob{font-family:"JetBrains Mono",monospace;font-size:12px;color:rgba(232,180,0,.6);margin-left:auto}
.award-actual-lbl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.award-input{width:100%;padding:7px 10px;border-radius:6px;border:1px solid var(--border);
  background:rgba(255,255,255,.06);color:var(--text);font-size:13px;font-weight:600;
  font-family:"Outfit",sans-serif;outline:none}
.award-input:focus{border-color:rgba(232,180,0,.5);background:rgba(232,180,0,.06)}
.award-candidates{margin-top:8px}
.award-cand-lbl{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.cand-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px;border-bottom:1px solid rgba(255,255,255,.04)}
.cand-row:last-child{border-bottom:none}
.cand-bar-bg{flex:1;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.cand-bar{height:100%;border-radius:2px;background:var(--gold)}
.cand-pct{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--muted);min-width:35px;text-align:right}

</style>
</head>

  "Francia":"🇫🇷","Senegal":"🇸🇳","Noruega":"🇳🇴","Iraq":"🇮🇶",
  "Argentina":"🇦🇷","Austria":"🇦🇹","Argelia":"🇩🇿","Jordania":"🇯🇴",
  "Portugal":"🇵🇹","Colombia":"🇨🇴","Uzbekistán":"🇺🇿","RD Congo":"🇨🇩",

/* ═══════════════ SIMULATION ENGINE ═══════════════ */
function poisson(l){
  if(l<=0)return 0;
  const L=Math.exp(-Math.min(l,20));
  let k=0,p=1;
  do{k++;p*=Math.random();}while(p>L&&k<20);
  return k-1;
}
function simGoals(tA,tB){
  // Dixon-Coles blended model: 50% Elo + 50% ataque/defensa por equipo
  const rA=getRating(tA),rB=getRating(tB);
  const d=eloOf(tA)-eloOf(tB);
  const homeA=HOME[tA]?0.10:0, homeB=HOME[tB]?0.10:0;
  const lA=Math.exp(0.223+d/800*0.5+(rA.att+rB.def)*0.5+homeA);
  const lB=Math.exp(0.223-d/800*0.5+(rB.att+rA.def)*0.5+homeB);
  return[poisson(lA),poisson(lB)];
}
function simKO(tA,tB){
  const rA=getRating(tA),rB=getRating(tB);
  const d=eloOf(tA)-eloOf(tB);
  let[a,b]=simGoals(tA,tB);
  if(a!==b)return a>b?tA:tB;
  // Prórroga: misma fórmula × 1/3
  const lAet=Math.exp(0.223+d/800*0.5+(rA.att+rB.def)*0.5)/3;
  const lBet=Math.exp(0.223-d/800*0.5+(rB.att+rA.def)*0.5)/3;
  const[ea,eb]=[poisson(lAet),poisson(lBet)];
  if(ea!==eb)return(a+ea)>(b+eb)?tA:tB;
  return Math.random()<0.5+0.04*Math.tanh(d/300)?tA:tB;
}
function sortSt(teams,s){
  return[...teams].sort((a,b)=>{
    const pd=(s[b].v*3+s[b].e)-(s[a].v*3+s[a].e);if(pd)return pd;
    const dd=(s[b].gf-s[b].gc)-(s[a].gf-s[a].gc);if(dd)return dd;
    return s[b].gf-s[a].gf;
  });
}
function simGroup(g){
  const ts=GRUPOS[g],s={};
  ts.forEach(t=>{s[t]={v:0,e:0,d:0,gf:0,gc:0};});
  PAIRS.forEach(([i,j])=>{
    const[gA,gB]=simGoals(ts[i],ts[j]);
    s[ts[i]].gf+=gA;s[ts[i]].gc+=gB;s[ts[j]].gf+=gB;s[ts[j]].gc+=gA;
    if(gA>gB){s[ts[i]].v++;s[ts[j]].d++;}
    else if(gB>gA){s[ts[j]].v++;s[ts[i]].d++;}
    else{s[ts[i]].e++;s[ts[j]].e++;}
  });
  return sortSt(ts,s).map(t=>({name:t,...s[t],pts:s[t].v*3+s[t].e,dg:s[t].gf-s[t].gc}));
}
function assignB3(best8){
  const slots=[
    {id:"M80",pool:"EHIJK"},{id:"M87",pool:"DEIJL"},{id:"M74",pool:"ABCDF"},
    {id:"M82",pool:"AEHIJ"},{id:"M77",pool:"CDFGH"},{id:"M81",pool:"BEFIJ"},
    {id:"M79",pool:"CEFHI"},{id:"M85",pool:"EFGIJ"}
  ];
  const used=new Set(),out={};
  slots.forEach(({id,pool})=>{
    const m=best8.find(t=>pool.includes(t.g)&&!used.has(t.g));
    if(m){out[id]=m.name;used.add(m.g);}
    else{const fb=best8.find(t=>!used.has(t.g));if(fb){out[id]=fb.name;used.add(fb.g);}}
  });
  return out;
}
function getBest3(gS){
  return LETTERS.map(g=>({g,name:gS[g][2]?.name||"?",pts:gS[g][2]?.pts||0,dg:gS[g][2]?.dg||0,gf:gS[g][2]?.gf||0}))
    .sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf).slice(0,8);
}
function runOne(groupPos){
  const gS={};
  for(const g of LETTERS){
    gS[g]=simGroup(g);
    gS[g].forEach((t,i)=>{
      if(!groupPos[g])groupPos[g]={};
      if(!groupPos[g][t.name])groupPos[g][t.name]=[0,0,0,0];
      groupPos[g][t.name][i]++;
    });
  }
  const qual={},b3=assignB3(getBest3(gS));
  LETTERS.forEach(g=>{qual["1"+g]=gS[g][0]?.name;qual["2"+g]=gS[g][1]?.name;});
  const W={};
  function slotTeam(slot,id){
    if(slot.t==="g")return qual[slot.p+slot.g]||"?";
    if(slot.t==="b3")return b3[id]||"?";
    return W[slot.mid]||"?";
  }
  R32.forEach(m=>{const a=slotTeam(m.a,m.id),b=slotTeam(m.b,m.id);W[m.id]=simKO(a,b);});
  [...R16,...QF,...SF].forEach(m=>{W[m.id]=simKO(W[m.a.mid]||"?",W[m.b.mid]||"?");});
  const champ=simKO(W.M101||"?",W.M102||"?");
  return{champ,finals:[W.M101,W.M102],semis:[W.M97,W.M98,W.M99,W.M100],
    r8:QF.map(m=>[W[m.a.mid],W[m.b.mid]]).flat()};
}

function getStandings(letter){
  const teams=GRUPOS[letter],s={};
  teams.forEach(t=>{s[t]={v:0,e:0,d:0,gf:0,gc:0};});
  PAIRS.forEach(([i,j],mi)=>{
    const sc=ST.groupActual[letter+"_"+mi];
    if(!sc||sc[0]==null||sc[1]==null)return;
    const[a,b]=[sc[0],sc[1]];
    s[teams[i]].gf+=a;s[teams[i]].gc+=b;s[teams[j]].gf+=b;s[teams[j]].gc+=a;
    if(a>b){s[teams[i]].v++;s[teams[j]].d++;}
    else if(b>a){s[teams[j]].v++;s[teams[i]].d++;}
    else{s[teams[i]].e++;s[teams[j]].e++;}
  });
  return[...teams].map(t=>({name:t,...s[t],pts:s[t].v*3+s[t].e,dg:s[t].gf-s[t].gc,pj:s[t].v+s[t].e+s[t].d}))
    .sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
}
function getAllStandings(){const o={};LETTERS.forEach(g=>{o[g]=getStandings(g);});return o;}
function getActualBest3(allSt){
  return LETTERS.map(g=>({g,...(allSt[g][2]||{name:"?",pts:0,dg:0,gf:0})}))
    .sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf).slice(0,8);
}
function predScore(tA,tB){
  // Usa el mismo modelo Dixon-Coles que la simulación
  const rA=getRating(tA),rB=getRating(tB);
  const d=eloOf(tA)-eloOf(tB);
  const homeA=HOME[tA]?0.10:0,homeB=HOME[tB]?0.10:0;
  const lA=Math.exp(0.223+d/800*0.5+(rA.att+rB.def)*0.5+homeA);
  const lB=Math.exp(0.223-d/800*0.5+(rB.att+rA.def)*0.5+homeB);
  // Bonus para mismatches grandes
  const bonus=Math.max(0,(d-350)/250)*0.5;
  const s1=Math.round(lA+bonus);
  const s2=Math.round(lB*0.65);
  return[Math.max(0,s1),Math.max(0,s2)];
}
function winProb(tA,tB){
  const d=eloOf(tA)-eloOf(tB);
  const pD=0.25/(1+0.0015*d*d);
  const pA=(1-pD)/(1+Math.pow(10,-d/400));
  return{win:Math.round(pA*100),lose:Math.round((1-pA-pD)*100)};
}
function matchAcc(ps1,ps2,as1,as2){
  if(as1==null||as2==null)return"p";
  if(ps1===as1&&ps2===as2)return"e";
  const pr=ps1>ps2?"a":ps1<ps2?"b":"d";
  const ar=as1>as2?"a":as1<as2?"b":"d";
  return pr===ar?"c":"w";
}
function accDot(status){
  const cls={e:"dot-e",c:"dot-c",w:"dot-w",p:"dot-p"}[status]||"dot-p";
  return`<div class="acc-dot ${cls}"></div>`;
}

/* Resolve KO team from actual results, fall back to prediction */
function resolveKOTeam(slot,allSt,b3assign,koWinMap){
  if(slot.t==="g"){
    const st=allSt[slot.g];
    const t=st&&st[slot.p-1]?.name;
    if(t&&t!=="?")return t;
    if(ST.simData?.groupPos){
      const gp=ST.simData.groupPos[slot.g]||{};
      const sorted=Object.entries(gp).sort((a,b)=>b[1][slot.p-1]-a[1][slot.p-1]);
      return sorted[0]?.[0]||"?";
    }
    return"?";
  }
  if(slot.t==="b3"){
    const found=b3assign[slot.pool]||b3assign["pool_"+slot.pool];
    return found||"?";
  }
  if(slot.t==="ko")return koWinMap[slot.mid]||"?";
  if(slot.t==="kol"){
    // Loser of a KO match = the team that did NOT win
    // buildKOMap stores team A as Wa[mid] and team B as Wb[mid]
    // We need these from the closure, so use a small lookup trick:
    const tA=koWinMap["_a_"+slot.mid]||"?";
    const tB=koWinMap["_b_"+slot.mid]||"?";
    const winner=koWinMap[slot.mid]||"?";
    if(tA==="?"||tB==="?") return "?";
    // The loser is whichever team is NOT the winner
    return winner===tA ? tB : tA;
  }
  return"?";
}
function buildKOMap(){
  const allSt=getAllStandings();
  const b3list=getActualBest3(allSt);
  // Build b3 assignment by pool
  const b3byPool={};
  const slots=[
    {id:"M80",pool:"EHIJK"},{id:"M87",pool:"DEIJL"},{id:"M74",pool:"ABCDF"},
    {id:"M82",pool:"AEHIJ"},{id:"M77",pool:"CDFGH"},{id:"M81",pool:"BEFIJ"},
    {id:"M79",pool:"CEFHI"},{id:"M85",pool:"EFGIJ"}
  ];
  const used=new Set();
  slots.forEach(({id,pool})=>{
    const m=b3list.find(t=>pool.includes(t.g)&&!used.has(t.g));
    if(m){b3byPool[id]=m.name;used.add(m.g);}
    else{const fb=b3list.find(t=>!used.has(t.g));if(fb){b3byPool[id]=fb.name;used.add(fb.g);}}
  });
  // Also build by pool string for resolveKOTeam
  const b3assign=Object.assign({},b3byPool);
  
  const W={},Wa={},Wb={};
  function res(slot,id){return resolveKOTeam(slot,allSt,b3assign,W);}
  
  ALL_KO.forEach(m=>{
    const a=res(m.a,m.id),b=res(m.b,m.id);
    Wa[m.id]=a;Wb[m.id]=b;
    W["_a_"+m.id]=a;W["_b_"+m.id]=b;
    const sc=ST.koActual[m.id];
    if(sc&&sc[0]!=null&&sc[1]!=null){
      W[m.id]=sc[0]>sc[1]?a:sc[1]>sc[0]?b:null;
    } else {
      W[m.id]=eloOf(a)>=eloOf(b)?a:b;
    }
  });
  return{W,Wa,Wb,allSt,b3list};
}

function computeAccuracy(){
  const{Wa,Wb}=buildKOMap();
  let exact=0,corr=0,wrong=0,pend=0;
  LETTERS.forEach(g=>{
    const ts=GRUPOS[g];
    PAIRS.forEach(([i,j],mi)=>{
      const sc=ST.groupActual[g+"_"+mi]||[null,null];
      const[ps1,ps2]=predScore(ts[i],ts[j]);
      const s=matchAcc(ps1,ps2,sc[0],sc[1]);
      if(s==="e")exact++;else if(s==="c")corr++;else if(s==="w")wrong++;else pend++;
    });
  });
  ALL_KO.forEach(m=>{
    const tA=Wa[m.id]||"?",tB=Wb[m.id]||"?";
    const[ps1,ps2]=predScore(tA,tB);
    const sc=ST.koActual[m.id]||[null,null];
    const s=matchAcc(ps1,ps2,sc[0],sc[1]);
    if(s==="e")exact++;else if(s==="c")corr++;else if(s==="w")wrong++;else pend++;
  });
  const tot=exact+corr+wrong;
  return{exact,corr,wrong,pend,tot,pct:tot>0?Math.round((exact+corr)/tot*100):null};
}

/* ── Modelo multi-factor para Goleador ── */
function scorerProb(candidates, simData){
  const{champ,sub,tercero}=teamAwardProb(simData);
  // Juegos esperados por equipo en simulación (proxy: winPct → profundidad)
  function expectedGames(team){
    const row=simData?.table?.find(t=>t.team===team);
    if(!row) return 4; // mínimo: 3 grupos + 1 KO
    // 3 grupos + probabilidades KO: r32,oct,qf,sf,final
    return 3 + (row.r8Pct/100)*1 + (row.semiPct/100)*1 + (row.finalPct/100)*1 + (row.winPct/100)*1;
  }
  const scored = candidates.map(c=>{
    const eg = expectedGames(c.t);
    const mkt   = c.p_mkt * 0.35;
    const form  = Math.min(c.gpg, 1.2) / 1.2 * 25 * 0.25;  // normalizado sobre Kane(1.20)
    const intl  = (c.ig / Math.max(c.ip,1)) * 50 * 0.15;    // goles per cap normalizado
    const wc_h  = Math.min(c.wc, 12) / 12 * 10 * 0.10;      // historial WC (max Mbappé=12)
    const pen_b = c.pen * 2.5 * 0.10;                         // bonus penalti
    const adv   = (eg / 7) * 5 * 0.05;                        // profundidad torneo
    const raw = mkt + form + intl + wc_h + pen_b + adv;
    return{...c, raw, debug:{mkt,form,intl,wc_h,pen_b,adv}};
  });
  const total = scored.reduce((s,c)=>s+c.raw,0)||1;
  return scored.map(c=>({...c,prob:Math.round(c.raw/total*100)}))
    .sort((a,b)=>b.prob-a.prob);
}

/* ── Modelo multi-factor para MVP ── */
function mvpProb(candidates, simData){
  const{champ,sub,tercero}=teamAwardProb(simData);
  const scored = candidates.map(c=>{
    const teamWin = simData?.table?.find(t=>t.team===c.t)?.winPct||0;
    const mkt     = c.p_mkt * 0.40;
    const form_s  = c.form / 10 * 20 * 0.30;
    const history = Math.min(c.wc_prev, 2) / 2 * 5 * 0.10;
    const champB  = c.t===champ?4: c.t===sub?2: c.t===tercero?1:0;
    const raw = mkt + form_s + history + champB;
    return{...c, raw};
  });
  const total = scored.reduce((s,c)=>s+c.raw,0)||1;
  return scored.map(c=>({...c,prob:Math.round(c.raw/total*100)}))
    .sort((a,b)=>b.prob-a.prob);
}

/* ── Modelo multi-factor para Guante de Oro ── */
function gloveProb(candidates, simData){
  const{champ,sub,tercero}=teamAwardProb(simData);
  const scored = candidates.map(c=>{
    const teamSemi = simData?.table?.find(t=>t.team===c.t)?.semiPct||0;
    const mkt      = c.p_mkt * 0.40;
    const defense  = c.clean_sh * 30 * 0.30;   // limpieza defensiva del equipo
    const saves_s  = c.saves / 10 * 15 * 0.20;
    const advB     = (teamSemi/100) * 5 * 0.10;
    const raw = mkt + defense + saves_s + advB;
    return{...c, raw};
  });
  const total = scored.reduce((s,c)=>s+c.raw,0)||1;
  return scored.map(c=>({...c,prob:Math.round(c.raw/total*100)}))
    .sort((a,b)=>b.prob-a.prob);
}

/* ── Dispatcher: elige modelo según id del premio ── */
function playerProb(id, simData){
  if(id==="goleador") return scorerProb(PLAYERS.goleador, simData);
  if(id==="mvp")      return mvpProb(PLAYERS.mvp, simData);
  if(id==="guante")   return gloveProb(PLAYERS.guante, simData);
  return [];
}

function teamAwardProb(simData){
  // Derive from actual predicted bracket — coherent with the KO map
  const{W,Wa,Wb}=buildKOMap();
  const sim=simData;

  // Final: M104
  const finA=Wa["M104"]||"?", finB=Wb["M104"]||"?";
  const champ  = eloOf(finA)>=eloOf(finB)?finA:finB;  // predicted winner
  const sub    = champ===finA?finB:finA;               // predicted runner-up

  // Third place: M103
  const tercero = W["M103"]||"?";

  // Probabilities from simulation if available
  const t=sim?.table||[];
  const champPct  = t.find(x=>x.team===champ)?.winPct?.toFixed(1)||"—";
  const subPct    = t.find(x=>x.team===sub)?.finalPct?.toFixed(1)||"—";
  const terceroPct= t.find(x=>x.team===tercero)?.semiPct?.toFixed(1)||"—";

  return{champ,sub,tercero,champPct,subPct,terceroPct};
}

function buildKOCard(m,isFinal){
  const{Wa,Wb,W}=buildKOMap();
  const tA=Wa[m.id]||"?",tB=Wb[m.id]||"?";
  const[ps1,ps2]=predScore(tA,tB);
  const sc=ST.koActual[m.id]||[null,null,null]; // [s1,s2,note]
  const as1=sc[0],as2=sc[1],note=sc[2]||"";
  const acc=matchAcc(ps1,ps2,as1,as2);
  const actRes=as1!=null&&as2!=null?(as1>as2?"a":as2>as1?"b":"d"):null;
  const sch=SCH[m.id]||{};
  const wp=winProb(tA,tB);
  const pRes=ps1>ps2?"a":ps1<ps2?"b":"d";
  function teamRow(name,ps,predWin,idx){
    const actWin=actRes===(idx===0?"a":"b");
    const actLose=actRes!=null&&!actWin;
    return`<div class="ko-team${actWin?" win-row":actLose?" lose-row":""}">
      <div class="ko-name">${f(name)}<span${name==="?"?' class="unk"':""}>
        ${name==="?"?"Por definir":esc(name)}
      </span><span style="font-size:9px;color:var(--muted);margin-left:3px">${idx===0?wp.win:wp.lose}%</span></div>
      <div class="pred-big${predWin?" win":""}">${ps}</div>
      <input class="score-in" type="number" min="0" max="30"
        data-ko="${m.id}" data-idx="${idx}" value="${(idx===0?as1:as2)!=null?(idx===0?as1:as2):""}">
    </div>`;
  }
  const accLbl=acc==="e"?`<div class="ko-acc-lbl acc-exact">✓ Exacto</div>`:
    acc==="c"?`<div class="ko-acc-lbl acc-correct">~ Ganador correcto</div>`:
    acc==="w"?`<div class="ko-acc-lbl acc-wrong">✗ Incorrecto</div>`:"";
  return`<div class="ko-card${isFinal?" final-card":""}">
    <div class="ko-hdr">
      <span>${m.id}·${esc(sch.d||m.id)}·${esc(sch.h||"")} COL·${esc(m.lb)}</span>
      <span class="venue">${esc(sch.v||"")}</span>
    </div>
    ${teamRow(tA,ps1,pRes==="a",0)}
    ${teamRow(tB,ps2,pRes==="b",1)}
    <div class="ko-act">
      <span class="ko-act-lbl">Real:</span>
      <input class="note-in" placeholder="Penaltis 4-2 / notas" data-ko-note="${m.id}" value="${esc(note)}">
      ${accDot(acc)}
    </div>
    ${accLbl}
  </div>`;
}

    return`<div style="font-size:11px;color:var(--muted);margin-bottom:10px;padding:7px 11px;background:rgba(255,255,255,.03);border-radius:6px;border-left:2px solid rgba(232,180,0,.25)">
      📊 Dorado=predicción modelo · Edita el resultado real · Tabla actualiza automáticamente
    </div>
    <div style="margin-bottom:8px;display:flex;gap:8px">
      <button onclick="toggleAllMatches(true)" style="font-size:11px;padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--muted);cursor:pointer">▾ Expandir todos</button>
      <button onclick="toggleAllMatches(false)" style="font-size:11px;padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--muted);cursor:pointer">▸ Colapsar todos</button>
    </div>
    <div class="grp-grid">${LETTERS.map(g=>buildGroupCard(g)).join("")}</div>
    <div class="b3-box" style="margin-top:10px">
      <div class="b3-title">🥉 Mejores 8 Terceros (de resultados ingresados)</div>
      <div class="b3-list">${b3.filter(t=>t.name!=="?").length>0
        ?b3.filter(t=>t.name!=="?").map(t=>`<div class="b3-pill">${f(t.name)} ${esc(t.name)} <span style="font-size:9px;color:rgba(232,180,0,.4)">(G${t.g}·${t.pts}pts)</span></div>`).join("")
        :`<span style="color:var(--muted);font-size:12px">Ingresa resultados para ver los terceros</span>`}
      </div>
    </div>`;
  }
  if(["r32","r16","qf","sf"].includes(t))return buildKOPhaseTab(t);
  if(t==="premios")return buildAwardsSection();
  if(t==="final")return buildFinalTab();
  return`<div style="color:var(--muted);padding:20px">Pestaña no encontrada</div>`;
}

function render(){
  const{exact,corr,wrong,pend,pct}=computeAccuracy();
  const sim=ST.simData;
  document.getElementById("root").innerHTML=`
    <div class="hdr">
      <div class="hdr-title">FIFA World Cup 2026</div>
      <div class="hdr-sub">Simulación Monte Carlo + Tracker Integrado</div>
      <div class="hdr-badges">
        <span class="badge badge-g">Elo + Poisson</span>
        <span class="badge badge-b">10,000 simulaciones</span>
        <span class="badge badge-g">48 selecciones · 104 partidos</span>
      </div>
      <div class="hdr-tools">
        <span id="saved-lbl" class="saved-lbl">${ST.savedAt?"💾 Guardado "+ST.savedAt:""}</span>
        <button class="reset-btn" onclick="clearState()">🗑 Borrar datos</button>
      </div>
    </div>
    ${buildAccBar()}
    <div class="tabs">${TAB_LIST.map(t=>`<button class="tab-btn${ST.tab===t.id?" active":""}" onclick="setTab('${t.id}')">${t.label}</button>`).join("")}</div>
    <div class="content">${buildTabContent()}</div>
  `;
  bindEvents();
  if(ST.tab==="col")startCountdown();
}

/* ═══════════════ EVENTS ═══════════════ */
function bindEvents(){
  // Group score inputs
  document.querySelectorAll(".score-in[data-key]").forEach(inp=>{
    inp.addEventListener("change",e=>{
      const key=e.target.dataset.key;
      const idx=parseInt(e.target.dataset.idx);
      const val=e.target.value===""?null:Math.max(0,parseInt(e.target.value)||0);
      if(!ST.groupActual[key])ST.groupActual[key]=[null,null];
      ST.groupActual[key][idx]=val;
      saveState();
      // Re-render just standings for this group (non-destructive)
      const parts=key.split("_");
      const letter=parts[0];
      rebuildGroupStandings(letter);
      rebuildAccBar();
    });
  });
  // KO score inputs
  document.querySelectorAll(".score-in[data-ko]").forEach(inp=>{
    inp.addEventListener("change",e=>{
      const id=e.target.dataset.ko;
      const idx=parseInt(e.target.dataset.idx);
      const val=e.target.value===""?null:Math.max(0,parseInt(e.target.value)||0);
      if(!ST.koActual[id])ST.koActual[id]=[null,null,null];
      ST.koActual[id][idx]=val;
      saveState();
      rebuildAccBar();
    });
  });
  // Award inputs
  document.querySelectorAll(".award-input[data-award]").forEach(inp=>{
    inp.addEventListener("input",e=>{
      ST.actualAwards[e.target.dataset.award]=e.target.value.trim();
      saveState();
      // Re-render award section only
      const sec=document.querySelector(".awards-grid");
      if(sec){sec.closest("div[style*=\'margin:20px\']") && render();}
    });
    inp.addEventListener("change",()=>render());
  });
  // KO note inputs
  document.querySelectorAll(".note-in[data-ko-note]").forEach(inp=>{
    inp.addEventListener("change",e=>{
      const id=e.target.dataset.koNote;
      if(!ST.koActual[id])ST.koActual[id]=[null,null,null];
      ST.koActual[id][2]=e.target.value;
      saveState();
    });
  });
}

function rebuildGroupStandings(letter){
  const card=document.getElementById("gc-"+letter);
  if(!card)return;
  const st=getStandings(letter);
  const tbody=card.querySelector("tbody");
  if(!tbody)return;
  tbody.innerHTML=st.map((t,i)=>{
    const dg=t.dg||0;
    const cls=i===0?"row-q1":i===1?"row-q2":i===2?"row-q3":"";
    return`<tr class="${cls}"><td><div class="tc"><span>${f(t.name)}</span><span>${esc(t.name.length>12?t.name.slice(0,11)+"…":t.name)}</span></div></td>
      <td>${t.pj||0}</td><td>${t.v||0}</td><td>${t.e||0}</td><td>${t.d||0}</td>
      <td>${t.gf||0}</td><td>${t.gc||0}</td>
      <td class="${dg>0?"dg-p":dg<0?"dg-n":""}">${dg>0?"+":""}${dg}</td>
      <td class="pts">${t.pts||0}</td></tr>`;
  }).join("");
}

function rebuildAccBar(){
  const bar=document.querySelector(".acc-bar");
  if(bar)bar.outerHTML=buildAccBar();
  else{const el=document.querySelector(".acc-bar");if(el)el.innerHTML=buildAccBar();}
  // Simpler: just update the numbers
  const{exact,corr,wrong,pend,pct}=computeAccuracy();
  const sim=ST.simData;
  const pills=document.querySelectorAll(".ap");
  if(pills[0])pills[0].textContent="✓ "+exact;
  if(pills[1])pills[1].textContent="~ "+corr;
  if(pills[2])pills[2].textContent="✗ "+wrong;
  if(pills[3])pills[3].textContent="⏳ "+pend;
  const pctEl=document.querySelector(".acc-pct");
  if(pctEl&&pct!=null)pctEl.textContent=pct+"%";
  const simLbl=document.querySelector(".sim-lbl");
  if(simLbl&&sim)simLbl.textContent=sim.nSims.toLocaleString()+" sims · Top: "+(sim.table[0]?.team||"")+" "+(sim.table[0]?.winPct||0).toFixed(1)+"%";
}

function setTab(id){
  ST.tab=id;
  render();
}

function toggleAllMatches(open){
  LETTERS.forEach(g=>{ST.openMatches[g]=open;});
  render();
}
function toggleMatches(letter){
  ST.openMatches[letter]=!ST.openMatches[letter];
  const list=document.querySelector(`#gc-${letter} .matches-list`);
  const btn=document.querySelector(`#gc-${letter} .match-toggle`);
  if(list){list.classList.toggle("open",ST.openMatches[letter]);}
  if(btn){const o=ST.openMatches[letter];btn.innerHTML=(o?"▾":"▸")+" Partidos · dorado=pred · edita resultado real";}
}

/* ═══════════════ SIMULATION ═══════════════ */
function runSim(){
  if(ST.simRunning)return;
  ST.simRunning=true;ST.simProgress=0;ST.simData=null;
  const wins={},finals={},semis={},r8c={},groupPos={};
  const TOTAL=10000,CHUNK=400;
  let done=0;
  const runBtn=document.getElementById("run-btn");
  const progWrap=document.getElementById("prog-wrap");
  const progFill=document.getElementById("prog-fill");
  if(runBtn){runBtn.disabled=true;runBtn.textContent="SIMULANDO 0%";}
  if(progWrap)progWrap.style.display="";
  function chunk(){
    const end=Math.min(done+CHUNK,TOTAL);
    for(let i=done;i<end;i++){
      try{
        const res=runOne(groupPos);
        if(res&&res.champ)wins[res.champ]=(wins[res.champ]||0)+1;
        if(res&&res.finals)res.finals.forEach(t=>{if(t)finals[t]=(finals[t]||0)+1;});
        if(res&&res.semis)res.semis.forEach(t=>{if(t)semis[t]=(semis[t]||0)+1;});
        if(res&&res.r8)res.r8.forEach(t=>{if(t)r8c[t]=(r8c[t]||0)+1;});
      }catch(e){}
    }
    done=end;
    const pct=Math.round(done/TOTAL*100);
    ST.simProgress=pct;
    if(runBtn)runBtn.textContent="SIMULANDO "+pct+"%";
    if(progFill)progFill.style.width=pct+"%";
    if(done<TOTAL){
      requestAnimationFrame(chunk);
    } else {
      const table=Object.keys(ELO).filter((v,i,a)=>a.indexOf(v)===i)
        .map(t=>({team:t,elo:eloOf(t),
          winPct:((wins[t]||0)/TOTAL)*100,
          finalPct:((finals[t]||0)/TOTAL)*100,
          semiPct:((semis[t]||0)/TOTAL)*100,
          r8Pct:((r8c[t]||0)/TOTAL)*100,
          opta:OPTA[t]||null
        })).sort((a,b)=>b.winPct-a.winPct);
      ST.simData={table,groupPos,nSims:TOTAL};
      ST.simRunning=false;
      saveState();
      render();
    }
  }
  requestAnimationFrame(chunk);
}

/* ═══════════════ COLOMBIA COUNTDOWN ═══════════════ */
let colTimer=null;
function startCountdown(){
  if(colTimer)clearInterval(colTimer);
  colTimer=setInterval(()=>{
    const el=document.getElementById("col-cd");
    if(!el){clearInterval(colTimer);return;}
    const next=COL_DTS.find(m=>m.dt.getTime()>Date.now());
    if(!next){el.textContent="Fase de grupos completada";clearInterval(colTimer);return;}
    const ms=next.dt.getTime()-Date.now();
    if(ms<=0){el.textContent="¡EN CURSO!";return;}
    const d=Math.floor(ms/86400000),h=Math.floor(ms%86400000/3600000),
          mi=Math.floor(ms%3600000/60000),s=Math.floor(ms%60000/1000);
    el.textContent=d>0?d+"d "+h+"h "+mi+"m":h>0?h+"h "+mi+"m "+s+"s":mi+"m "+s+"s";
  },1000);
}

function activarAlertas(){
  if(typeof Notification==="undefined"){alert("Tu navegador no soporta notificaciones.");return;}
  Notification.requestPermission().then(p=>{
    if(p==="granted"){
      let n=0;
      COL_DTS.forEach(m=>{
        const d30=m.dt.getTime()-30*60000-Date.now();
        const d0=m.dt.getTime()-Date.now();
        if(d30>0){setTimeout(()=>new Notification("⚽ Colombia en 30 min",{body:m.label+" · "+m.venue,icon:"./icon-192.png",tag:"col30-"+m.dt.getTime()}),d30);n++;}
        if(d0>0){setTimeout(()=>new Notification("🔴 ¡Comienza Colombia!",{body:m.label+" · "+m.venue,icon:"./icon-192.png",tag:"col0-"+m.dt.getTime()}),d0);}
      });
      if(n>0)alert("✓ Alertas programadas para "+n+" partido(s). Mantén la app abierta.");
      else alert("No hay partidos próximos de Colombia.");
      render();
    } else {
      alert("Permiso denegado. Activa notificaciones en la configuración del navegador.");
    }
  });
}
