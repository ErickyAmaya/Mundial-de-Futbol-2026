    r8: QF.map(m => [W[m.a], W[m.b]]).flat()
  };
}

/* ══════════════ DERIVAR BRACKET PREDICHO ══════════════ */
function buildPredStandings(groupPos) {
  const out = {};
  for (const g of LETTERS) {
    const gp = groupPos[g] || {};
    const teams = [...GRUPOS[g]];
    const assigned = [],
      result = [];
    for (let pos = 0; pos < 4; pos++) {
      const best = teams.filter(t => !assigned.includes(t)).sort((a, b) => (gp[b]?.[pos] || 0) - (gp[a]?.[pos] || 0))[0];
      if (best) {
        result.push(best);
        assigned.push(best);
      }
    }
    out[g] = result;
  }
  return out;
}

// Expected score from Elo
function predScore(tA, tB) {
  const lA = Math.exp(0.223 + (elo(tA) - elo(tB)) / 800);
  const lB = Math.exp(0.223 + (elo(tB) - elo(tA)) / 800);
  return [Math.round(lA), Math.round(lB)];
}
// Win prob (for display)
function winProb(tA, tB) {
  const d = elo(tA) - elo(tB);
  const pD = 0.25 / (1 + 0.0015 * d * d);
  const pA = (1 - pD) / (1 + Math.pow(10, -d / 400));
  return {
    win: Math.round(pA * 100),
    draw: Math.round(pD * 100),
    lose: Math.round((1 - pA - pD) * 100)
  };
}
function buildKOBracket(predStandings, b3assign) {
  const W = {};
  function resolve(slot, id) {
    if (slot.t === "g") return predStandings[slot.g]?.[slot.p - 1] || "?";
    if (slot.t === "b3") return b3assign[id] || "?";
    return W[slot] || "?";
  }
  R32.forEach(m => {
    const a = resolve(m.a, m.id),
      b = resolve(m.b, m.id);
    W[m.id] = elo(a) >= elo(b) ? a : b;
  });
  [...R16, ...QF, ...SF].forEach(m => {
    const a = W[m.a] || "?",
      b = W[m.b] || "?";
    W[m.id] = elo(a) >= elo(b) ? a : b;
  });
  W.M104W = elo(W.M101 || "?") >= elo(W.M102 || "?") ? W.M101 : W.M102;
  W.M103a = W.M101;
  W.M103b = W.M102; // losers shown in 3rd
  return W;
}

/* ══════════════ GRUPO STANDINGS (actual results) ══════════════ */
function computeStandings(g, actualScores) {
  const teams = GRUPOS[g],
    s = {};
  teams.forEach(t => {
    s[t] = {
      v: 0,
      e: 0,
      d: 0,
      gf: 0,
      gc: 0
    };
  });
  PAIRS.forEach(([i, j], mi) => {
    const sc = actualScores[`${g}_${mi}`];
    if (!sc || sc[0] === null || sc[1] === null) return;
    const [a, b] = [sc[0], sc[1]];
    s[teams[i]].gf += a;
    s[teams[i]].gc += b;
    s[teams[j]].gf += b;
    s[teams[j]].gc += a;
    if (a > b) {
      s[teams[i]].v++;
      s[teams[j]].d++;
    } else if (b > a) {
      s[teams[j]].v++;
      s[teams[i]].d++;
    } else {
      s[teams[i]].e++;
      s[teams[j]].e++;
    }
  });
  const sorted = sortSt(teams, s);
  return sorted.map(t => ({
    name: t,
    ...s[t],
    pts: s[t].v * 3 + s[t].e,
    dg: s[t].gf - s[t].gc,
    pj: s[t].v + s[t].e + s[t].d
  }));
}

// Determine team in KO slot from actual standings
function resolveActualTeam(slot, matchId, actualStandings, koActual, koWinners) {
  if (slot.t === "g") {
    const st = actualStandings[slot.g];
    return st?.[slot.p - 1]?.name || "?";
  }
  if (slot.t === "b3") {
    const thirds = LETTERS.map(g => ({
      g,
      ...(actualStandings[g]?.[2] || {
        name: "?",
        pts: 0,
        dg: 0,
        gf: 0
      })
    })).sort((a, b) => b.pts - a.pts || b.dg - a.dg || b.gf - a.gf).slice(0, 8);
    return assignB3(thirds)[matchId] || "?";
  }
  return koWinners[slot] || "?";
}
function getKOWinner(id, koActual, koWinners) {
  const sc = koActual[id];
  if (!sc || sc.s1 === null || sc.s2 === null) return null;
  const tA = koWinners[id + "_a"],
    tB = koWinners[id + "_b"];
  if (sc.note && sc.note.toLowerCase().includes("pen")) {
    const m = sc.note.match(/(\d+)[–-](\d+)/);
    if (m) return parseInt(m[1]) > parseInt(m[2]) ? tA : tB;
  }
  if (sc.s1 > sc.s2) return tA;
  if (sc.s2 > sc.s1) return tB;
  return null;
}
function matchAcc(pS1, pS2, aS1, aS2, pNote, aNote) {
  if (aS1 === null || aS2 === null) return "pending";
  const pR = pS1 > pS2 ? "a" : pS1 < pS2 ? "b" : "d";
  const aR = aS1 > aS2 ? "a" : aS1 < aS2 ? "b" : "d";
  if (pS1 === aS1 && pS2 === aS2) return "exact";
  if (pR === aR) return "correct";
  return "wrong";
}

.notif-btn.primary{background:rgba(253,216,53,.15);border:1px solid rgba(253,216,53,.3);color:#fdd835;}
.notif-btn.primary:hover{background:rgba(253,216,53,.25);}
.notif-btn.cal{background:rgba(82,183,136,.1);border:1px solid rgba(82,183,136,.25);color:var(--green);}
.notif-btn.cal:hover{background:rgba(82,183,136,.2);}
.notif-ok{font-size:11px;color:var(--green);padding:4px 0;}
.ko-path-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:4px;}
.ko-path-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.ko-path-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;}
.ko-path-row:last-child{border-bottom:none;}
.no-sim{text-align:center;padding:40px;color:var(--muted);font-size:13px;line-height:2;}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-top:14px;}
.sum-card{background:rgba(255,255,255,.03);border-radius:6px;padding:9px;text-align:center;border:1px solid var(--border);}
.sum-lbl{font-size:10px;color:var(--muted);margin-bottom:3px;}
.sum-val{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;}
`;
